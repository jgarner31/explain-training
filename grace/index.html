<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Grace">
<title>Grace</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; background: #000000; font-family: Georgia, 'Times New Roman', serif; overflow: hidden; touch-action: manipulation; }
.screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 24px 20px 20px; gap: 16px; }
.header { text-align: center; color: #ffffff; font-size: clamp(18px, 3vw, 26px); font-weight: normal; letter-spacing: 0.12em; text-transform: uppercase; padding-bottom: 4px; border-bottom: 1px solid #0055ff; flex-shrink: 0; }
.grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; flex: 1; min-height: 0; }
.contact { background: #000000; border: 3px solid #0055ff; border-radius: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; cursor: pointer; text-decoration: none; transition: transform 0.12s ease; }
.contact:active { transform: scale(0.96); border-color: #00aaff; }
.avatar { width: clamp(64px, 12vw, 100px); height: clamp(64px, 12vw, 100px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: clamp(26px, 5vw, 42px); font-weight: bold; color: #000000; background: #0055ff; flex-shrink: 0; }
.name { color: #0066ff; font-size: clamp(28px, 5.5vw, 48px); font-weight: bold; letter-spacing: 0.04em; text-align: center; line-height: 1; }
.phone-hint { color: #ffffff; font-size: clamp(13px, 2vw, 18px); font-family: 'Courier New', monospace; letter-spacing: 0.06em; text-align: center; opacity: 0.85; }
</style>
</head>
<body>
<div class="screen">
  <div class="header">Grace's Phone</div>
  <div class="grid">
    <a class="contact" href="tel:15614901332"><div class="avatar">P</div><div class="name">Pat</div><div class="phone-hint">(561) 490-1332</div></a>
    <a class="contact" href="tel:16188890943"><div class="avatar">J</div><div class="name">John</div><div class="phone-hint">(618) 889-0943</div></a>
    <a class="contact" href="tel:16187131536"><div class="avatar">S</div><div class="name">Steven</div><div class="phone-hint">(618) 713-1536</div></a>
    <a class="contact" href="tel:15617476025"><div class="avatar">L</div><div class="name">Lenny</div><div class="phone-hint">(561) 747-6025</div></a>
  </div>
</div>
</body>
</html>
